<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlashVote</title>

<style>
body {
  margin: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

.container {
  position: relative;
  width: 100%;
  height: 100vh;
}

.hero-image {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
}

/* pulse exactly matches uploaded ring */
.pulse-ring {
  position: absolute;
  top: 13.8%;
  left: 50%;
  width: 23vw;
  height: 23vw;
  max-width: 320px;
  max-height: 320px;
  transform: translateX(-50%);
  border-radius: 50%;
  box-shadow:
    0 0 10px rgba(255,140,0,0.35),
    0 0 20px rgba(255,140,0,0.22);
  animation: pulseGlow 2.6s infinite ease-in-out;
  pointer-events: none;
}

@keyframes pulseGlow {
  0% {
    transform: translateX(-50%) scale(1);
    box-shadow:
      0 0 10px rgba(255,140,0,0.35),
      0 0 20px rgba(255,140,0,0.22);
  }

  50% {
    transform: translateX(-50%) scale(1.01);
    box-shadow:
      0 0 16px rgba(255,140,0,0.55),
      0 0 28px rgba(255,140,0,0.30);
  }

  100% {
    transform: translateX(-50%) scale(1);
    box-shadow:
      0 0 10px rgba(255,140,0,0.35),
      0 0 20px rgba(255,140,0,0.22);
  }
}

/* button clickable */
.enter-link {
  position: absolute;
  bottom: 18%;
  left: 50%;
  transform: translateX(-50%);
  width: 22%;
  height: 7%;
  display: block;
  z-index: 10;
}

</style>
</head>

<body>

<div class="container">
  <img src="enter-flashvote.png" alt="FlashVote" class="hero-image">
  <div class="pulse-ring"></div>
  <a href="main.html" class="enter-link"></a>
</div>

</body>
</html>
