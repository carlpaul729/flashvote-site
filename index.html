<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlashVote</title>

  <meta property="og:title" content="FlashVote">
  <meta property="og:description" content="Sentiment moves fast. Outcomes follow.">
  <meta property="og:image" content="https://flashvotehq.com/flashvote-preview.png">
  <meta property="og:url" content="https://flashvotehq.com">
  <meta property="og:type" content="website">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="FlashVote">
  <meta name="twitter:description" content="Sentiment moves fast. Outcomes follow.">
  <meta name="twitter:image" content="https://flashvotehq.com/flashvote-preview.png">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
    }

    body {
      position: relative;
      font-family: Arial, sans-serif;
    }

    .background {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 53%;
    }

    .overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 72%;
      max-width: 1100px;
      transform: translate(-50%, -50%);
    }

    .overlay img {
      width: 100%;
      display: block;
    }

    .enter-button {
      position: absolute;
      left: 49.25%;
      bottom: 22%;
      transform: translateX(-50%);
      width: 30%;
      height: 7%;
      display: block;
    }

    @media (max-width: 768px) {
      .overlay {
        width: 100%;
        max-width: none;
        top: 48%;
      }

      .enter-button {
        left: 49.25%;
        bottom: 22%;
        width: 30%;
        height: 7%;
      }
    }
  </style>
</head>

<body>

  <img src="flashvote-backdrop.png" alt="FlashVote Background" class="background">

  <div class="overlay">
    <img src="flashvote-overlay.png" alt="FlashVote Overlay">
    <a href="about.html" class="enter-button"></a>
  </div>

</body>
</html>
