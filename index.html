<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlashVote</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: black;
  font-family: Arial, sans-serif;
}

.hero {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* bottom floor extension only */
.floor-extension {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 38%;
  background: url("enter-flashvote.png") center bottom / cover no-repeat;
  transform: scaleX(1.8);
  filter: brightness(0.55);
  opacity: 0.55;
  z-index: 1;
}

/* locked main image */
.hero-image {
  position: relative;
  height: 108vh;
  width: auto;
  display: block;
  z-index: 2;
  animation: subtlePulse 6s ease-in-out infinite;
}

@keyframes subtlePulse {
  0% {
    filter: brightness(1);
  }
  50% {
    filter: brightness(1.01);
  }
  100% {
    filter: brightness(1);
  }
}

.enter-link {
  position: absolute;
  width: 220px;
  height: 60px;
  left: 50%;
  top: 74%;
  transform: translateX(-50%);
  z-index: 3;
}

@media (max-width: 768px) {
  .floor-extension {
    display: none;
  }

  .hero-image {
    width: 100vw;
    height: auto;
  }

  .enter-link {
    width: 180px;
    height: 50px;
    top: 74%;
  }
}
</style>
</head>

<body>

<div class="hero">
  <div class="floor-extension"></div>
  <img src="enter-flashvote.png" alt="FlashVote" class="hero-image">
  <a href="main.html" class="enter-link"></a>
</div>

</body>
</html>
