```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlashVote</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: black;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

.hero {
  position: relative;
  width: 100vw;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

.hero-image {
  width: 92%;
  max-width: 1400px;
  height: auto;
  object-fit: contain;
  animation: subtlePulse 6s ease-in-out infinite;
}

@keyframes subtlePulse {
  0% {
    filter: brightness(1) drop-shadow(0 0 6px rgba(255,140,0,0.12));
  }
  50% {
    filter: brightness(1.015) drop-shadow(0 0 10px rgba(255,140,0,0.18));
  }
  100% {
    filter: brightness(1) drop-shadow(0 0 6px rgba(255,140,0,0.12));
  }
}

.enter-link {
  position: absolute;
  width: 220px;
  height: 60px;
  bottom: 18%;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
}

@media (max-width: 768px) {
  .hero-image {
    width: 100%;
  }

  .enter-link {
    width: 180px;
    height: 50px;
    bottom: 15%;
  }
}

@media (min-width: 1600px) {
  .hero-image {
    width: 88%;
  }
}
</style>
</head>

<body>

<div class="hero">
  <img src="enter-flashvote.png" alt="FlashVote" class="hero-image">

  <a href="main.html" class="enter-link"></a>
</div>

</body>
</html>
