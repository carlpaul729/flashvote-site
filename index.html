<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlashVote</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
    }

    .hero {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    .hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .enter-link {
      position: absolute;
      width: 210px;
      height: 55px;
      left: 50%;
      top: 79%;
      transform: translateX(-50%);
      z-index: 10;
    }

    @media (max-width: 768px) {
      .hero img {
        object-fit: contain;
      }

      .enter-link {
        width: 170px;
        height: 48px;
      }
    }
  </style>
</head>
<body>

<div class="hero">
  <img src="./enter-flashvote.png" alt="FlashVote">
  <a href="main.html" class="enter-link"></a>
</div>

</body>
</html>
