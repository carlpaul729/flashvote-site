<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlashVote</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: black;
  font-family: Arial, sans-serif;
}

.hero {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* stretched background darker and enlarged */
.hero::before {
  content: "";
  position: absolute;
  inset: 0;
  background: url("enter-flashvote.png") center center / cover no-repeat;
  filter: brightness(0.18);
  transform: scale(1.4);
}

/* dark overlay to suppress duplicate center */
.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(circle, transparent 25%, rgba(0,0,0,0.75) 65%);
}

.hero-image {
  position: relative;
  height: 108vh;
  width: auto;
  display: block;
  z-index: 3;
  animation: subtlePulse 6s ease-in-out infinite;
}

@keyframes subtlePulse {
  0% {
    filter: brightness(1);
  }
  50% {
    filter: brightness(1.01);
  }
  100% {
    filter: brightness(1);
  }
}

.enter-link {
  position: absolute;
  width: 220px;
  height: 60px;
  left: 50%;
  top: 74%;
  transform: translateX(-50%);
  z-index: 4;
}

@media (max-width: 768px) {
  .hero-image {
    width: 100vw;
    height: auto;
  }

  .hero::before,
  .hero::after {
    display: none;
  }

  .enter-link {
    width: 180px;
    height: 50px;
    top: 74%;
  }
}
</style>
</head>

<body>

<div class="hero">
  <img src="enter-flashvote.png" alt="FlashVote" class="hero-image">
  <a href="main.html" class="enter-link"></a>
</div>

</body>
</html>
