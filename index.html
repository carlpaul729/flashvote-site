<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlashVote</title>

<style>
body {
  margin: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

.container {
  position: relative;
  width: 100%;
  height: 100vh;
}

.hero-image {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
}

.pulse-ring {
  position: absolute;
  top: 18%;
  left: 50%;
  width: 26vw;
  height: 26vw;
  max-width: 360px;
  max-height: 360px;
  transform: translateX(-50%);
  border-radius: 50%;
  box-shadow:
    0 0 12px rgba(255,140,0,0.5),
    0 0 24px rgba(255,140,0,0.35);
  animation: pulseGlow 2.6s infinite ease-in-out;
}

@keyframes pulseGlow {
  0% {
    transform: translateX(-50%) scale(1);
    box-shadow:
      0 0 12px rgba(255,140,0,0.5),
      0 0 24px rgba(255,140,0,0.35);
  }

  50% {
    transform: translateX(-50%) scale(1.015);
    box-shadow:
      0 0 20px rgba(255,140,0,0.85),
      0 0 38px rgba(255,140,0,0.45);
  }

  100% {
    transform: translateX(-50%) scale(1);
    box-shadow:
      0 0 12px rgba(255,140,0,0.5),
      0 0 24px rgba(255,140,0,0.35);
  }
}

.enter-link {
  position: absolute;
  bottom: 15%;
  left: 50%;
  transform: translateX(-50%);
  width: 26%;
  height: 8%;
}

</style>
</head>

<body>

<div class="container">
  <img src="enter-flashvote.png" alt="FlashVote" class="hero-image">
  <div class="pulse-ring"></div>
  <a href="main.html" class="enter-link"></a>
</div>

</body>
</html>
