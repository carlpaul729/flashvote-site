<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlashVote</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
      font-family: Arial, sans-serif;
    }

    .hero {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    .hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      animation: microPulse 3.2s ease-in-out infinite;
    }

    .enter-link {
      position: absolute;
      width: 210px;
      height: 55px;
      left: 50%;
      top: 79%;
      transform: translateX(-50%);
      z-index: 10;
    }

    @keyframes microPulse {
      0%   { filter: brightness(0.96); }
      8%   { filter: brightness(1); }
      14%  { filter: brightness(0.97); }
      20%  { filter: brightness(1); }
      100% { filter: brightness(0.96); }
    }

    @media (max-width: 768px) {
      .hero img {
        object-fit: contain;
        object-position: center;
      }

      .enter-link {
        width: 170px;
        height: 48px;
      }
    }
  </style>
</head>
<body>

<div class="hero">
  <img src="enter-flashvote.png" alt="FlashVote" id="heroImg">
  <a href="main.html" class="enter-link" id="enterLink"></a>
</div>

<script>
function positionMobileButton() {
  if (window.innerWidth > 768) return;

  var img = document.getElementById('heroImg');
  var link = document.getElementById('enterLink');

  var nw = img.naturalWidth;
  var nh = img.naturalHeight;
  if (!nw || !nh) return;

  var vpW = window.innerWidth;
  var vpH = window.innerHeight;

  var scale = Math.min(vpW / nw, vpH / nh);
  var renderedW = nw * scale;
  var renderedH = nh * scale;

  var imgTop = (vpH - renderedH) / 2;
  var imgLeft = (vpW - renderedW) / 2;

  var buttonTopPx = imgTop + renderedH * 0.79;

  link.style.top = buttonTopPx + 'px';
  link.style.left = (imgLeft + renderedW / 2) + 'px';
  link.style.transform = 'translateX(-50%)';
}

var img = document.getElementById('heroImg');

if (img.complete && img.naturalWidth) {
  positionMobileButton();
} else {
  img.addEventListener('load', positionMobileButton);
}

window.addEventListener('resize', positionMobileButton);
</script>

</body>
</html>
