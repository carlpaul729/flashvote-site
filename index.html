```html
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlashVote</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: black;
    }

    .hero {
      position: relative;
      width: 100vw;
      height: 100vh;
      background-image: url('enter-flashvote.png');
      background-repeat: no-repeat;
      background-position: center center;
      background-size: 79%;
      animation: microPulse 3.2s ease-in-out infinite;
    }

    .enter-link {
      position: absolute;
      left: 50%;
      top: 79%;
      transform: translate(-50%, -50%);
      width: 210px;
      height: 55px;
      display: block;
      border-radius: 18px;
      text-decoration: none;
      cursor: pointer;
    }

    @keyframes microPulse {
      0% {
        filter: brightness(0.96);
      }
      8% {
        filter: brightness(1);
      }
      14% {
        filter: brightness(0.97);
      }
      20% {
        filter: brightness(1);
      }
      100% {
        filter: brightness(0.96);
      }
    }

    @media (max-width: 768px) {
      .hero {
        background-size: 250%;
        background-position: center 44%;
      }

      .enter-link {
        width: 180px;
        height: 50px;
        top: 74%;
      }
    }
  </style>
</head>

<body>

<div class="hero">
  <a href="main.html" class="enter-link"></a>
</div>

</body>
</html>
```
