<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlashVote</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
      font-family: Arial, sans-serif;
    }

    .hero {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    .hero img {
      width: 140%;
      height: 100%;
      object-fit: cover;
      object-position: center 52%;
      animation: microPulse 3.2s ease-in-out infinite;
    }

    .enter-link {
      position: absolute;
      width: 210px;
      height: 55px;
      left: 50%;
      top: 79%;
      transform: translateX(-50%);
      z-index: 2;
    }

    @keyframes microPulse {
      0%   { filter: brightness(0.96); }
      8%   { filter: brightness(1); }
      14%  { filter: brightness(0.97); }
      20%  { filter: brightness(1); }
      100% { filter: brightness(0.96); }
    }

    @media (max-width: 768px) {
      .hero img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center 52%;
      }

      .enter-link {
        width: 180px;
        height: 50px;
        top: 74%;
      }
    }
  </style>
</head>

<body>

<div class="hero">
  <img src="enter-flashvote.png?v=2" alt="FlashVote">
  <a href="main.html" class="enter-link"></a>
</div>

</body>
</html>
