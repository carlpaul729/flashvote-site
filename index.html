<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlashVote</title>

  <meta property="og:title" content="FlashVote">
  <meta property="og:description" content="Sentiment moves fast. Outcomes follow.">
  <meta property="og:image" content="https://flashvotehq.com/flashvote-preview.png">
  <meta property="og:url" content="https://flashvotehq.com">
  <meta property="og:type" content="website">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="FlashVote">
  <meta name="twitter:description" content="Sentiment moves fast. Outcomes follow.">
  <meta name="twitter:image" content="https://flashvotehq.com/flashvote-preview.png">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100svh;
    }

    .hero {
      position: relative;
      width: 100%;
      height: 100svh;
      min-height: 100svh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      background: black;
    }

    .background {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 41%;
      transform: scale(1.01);
    }

    .overlay {
      position: absolute;
      width: clamp(320px, 68%, 1000px);
      top: 50%;
      left: 50%;
      transform: translate3d(-50%, -50%, 0);
      z-index: 2;
      animation: microPulse 3s ease-in-out infinite;
      filter: drop-shadow(0 0 10px rgba(255,140,0,0.38));
      will-change: transform;
    }

    .overlay img {
      width: 100%;
      display: block;
      pointer-events: none;
      user-select: none;
    }

    .enter-button {
      position: absolute;
      left: 49.25%;
      bottom: 22%;
      transform: translateX(-50%);
      width: 30%;
      height: 7%;
      display: block;
      z-index: 3;
    }

    @keyframes microPulse {
      0% {
        transform: translate3d(-50%, -50%, 0) scale(1);
        filter: brightness(0.985) drop-shadow(0 0 10px rgba(255,140,0,0.34));
      }

      8% {
        transform: translate3d(-50%, -50%, 0) scale(1.010);
        filter: brightness(1) drop-shadow(0 0 13px rgba(255,140,0,0.42));
      }

      14% {
        transform: translate3d(-50%, -50%, 0) scale(1.004);
        filter: brightness(0.992) drop-shadow(0 0 11px rgba(255,140,0,0.36));
      }

      20% {
        transform: translate3d(-50%, -50%, 0) scale(1.010);
        filter: brightness(1) drop-shadow(0 0 13px rgba(255,140,0,0.42));
      }

      100% {
        transform: translate3d(-50%, -50%, 0) scale(1);
        filter: brightness(0.985) drop-shadow(0 0 10px rgba(255,140,0,0.34));
      }
    }

    @media (max-width: 768px) {
      .overlay {
        width: 92%;
      }
    }

    @supports (-webkit-touch-callout: none) {
      .overlay {
        top: 46%;
      }
    }
  </style>
</head>

<body>

  <div class="hero">
    <img src="flashvote-backdrop.png" class="background" alt="FlashVote Background">

    <div class="overlay">
      <img src="flashvote-overlay.png" alt="FlashVote Overlay">
      <a href="about.html" class="enter-button"></a>
    </div>
  </div>

</body>
</html>
