<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlashVote</title>

<style>
body {
  margin: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

.container {
  position: relative;
  width: 100%;
  height: 100vh;
}

.hero-image {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
}

/* corrected final pulse */
.pulse-ring {
  position: absolute;
  top: 14.8%;
  left: 50%;
  width: 18vw;
  height: 18vw;
  max-width: 250px;
  max-height: 250px;
  transform: translateX(-50%);
  border-radius: 50%;
  animation: pulseGlow 2.4s infinite ease-in-out;
  pointer-events: none;
}

@keyframes pulseGlow {
  0% {
    box-shadow:
      0 0 10px rgba(255,140,0,0.20),
      0 0 20px rgba(255,140,0,0.12);
  }

  50% {
    box-shadow:
      0 0 18px rgba(255,140,0,0.38),
      0 0 30px rgba(255,140,0,0.18);
  }

  100% {
    box-shadow:
      0 0 10px rgba(255,140,0,0.20),
      0 0 20px rgba(255,140,0,0.12);
  }
}

/* clickable button */
.enter-link {
  position: absolute;
  bottom: 19%;
  left: 50%;
  transform: translateX(-50%);
  width: 20%;
  height: 7%;
  display: block;
  z-index: 10;
}

</style>
</head>

<body>

<div class="container">
  <img src="enter-flashvote.png" alt="FlashVote" class="hero-image">
  <div class="pulse-ring"></div>
  <a href="main.html" class="enter-link"></a>
</div>

</body>
</html>
