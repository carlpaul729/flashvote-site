<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlashVote</title>

<style>
body {
  margin: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

.container {
  position: relative;
  width: 100%;
  height: 100vh;
}

.hero-image {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
}

/* pulse exactly centered on logo */
.pulse-ring {
  position: absolute;
  top: 15.5%;
  left: 50%;
  width: 20vw;
  height: 20vw;
  max-width: 280px;
  max-height: 280px;
  transform: translateX(-50%);
  border-radius: 50%;
  box-shadow:
    0 0 12px rgba(255,140,0,0.45),
    0 0 24px rgba(255,140,0,0.28);
  animation: pulseGlow 2.6s infinite ease-in-out;
  pointer-events: none;
}

@keyframes pulseGlow {
  0% {
    transform: translateX(-50%) scale(1);
    box-shadow:
      0 0 12px rgba(255,140,0,0.45),
      0 0 24px rgba(255,140,0,0.28);
  }

  50% {
    transform: translateX(-50%) scale(1.012);
    box-shadow:
      0 0 18px rgba(255,140,0,0.75),
      0 0 32px rgba(255,140,0,0.38);
  }

  100% {
    transform: translateX(-50%) scale(1);
    box-shadow:
      0 0 12px rgba(255,140,0,0.45),
      0 0 24px rgba(255,140,0,0.28);
  }
}

/* clickable button exactly lower */
.enter-link {
  position: absolute;
  bottom: 19%;
  left: 50%;
  transform: translateX(-50%);
  width: 20%;
  height: 7%;
  display: block;
  z-index: 10;
}

</style>
</head>

<body>

<div class="container">
  <img src="enter-flashvote.png" alt="FlashVote" class="hero-image">
  <div class="pulse-ring"></div>
  <a href="main.html" class="enter-link"></a>
</div>

</body>
</html>
