<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlashVote</title>

<style>
body {
  margin: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

.container {
  position: relative;
  width: 100%;
  height: 100vh;
}

.hero-image {
  width: 92%;
  height: 92%;
  object-fit: contain;
  display: block;
  margin: auto;
  animation: imagePulse 2.6s infinite ease-in-out;
}

@keyframes imagePulse {
  0% {
    filter: brightness(1) drop-shadow(0 0 4px rgba(255,140,0,0.10));
  }

  50% {
    filter: brightness(1.03) drop-shadow(0 0 10px rgba(255,140,0,0.18));
  }

  100% {
    filter: brightness(1) drop-shadow(0 0 4px rgba(255,140,0,0.10));
  }
}

.enter-link {
  position: absolute;
  bottom: 19%;
  left: 50%;
  transform: translateX(-50%);
  width: 20%;
  height: 7%;
  display: block;
  z-index: 10;
}

/* mobile keeps full strength */
@media (max-width: 768px) {
  .hero-image {
    width: 100%;
    height: 100%;
  }

  .enter-link {
    width: 42%;
    height: 8%;
    bottom: 18%;
  }
}

</style>
</head>

<body>

<div class="container">
  <img src="enter-flashvote.png" alt="FlashVote" class="hero-image">
  <a href="main.html" class="enter-link"></a>
</div>

</body>
</html>
