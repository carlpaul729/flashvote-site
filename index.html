<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlashVote</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: black;
}

.hero {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}

.backdrop {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.overlay {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 72%;
  max-width: 700px;
  transform: translate(-50%, -50%);
}

@media (max-width: 768px) {
  .overlay {
    width: 85%;
  }
}
</style>
</head>

<body>

<div class="hero">
  <img src="flashvote-backdrop.png" class="backdrop" alt="Backdrop">
  <img src="flashvote-overlay.png" class="overlay" alt="Overlay">
</div>

</body>
</html>
